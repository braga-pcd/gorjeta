<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de gorjeta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjord+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
   <header>
        <img src="./Imagens/logo.svg" alt="Logo splitter">
   </header>

   <main>
    <section class="informacoes">
        <form action="">
            <div class="conta">
                <label for="conta">Conta</label>
                <div>
                    <img src="./Imagens/icon-dollar.svg" alt="">
                    <input type="number" name="conta" id="conta" placeholder="0">
                </div>
            </div>
            
            <div class="gorjeta">
                <label for="outra">Selecione a gorjeta %</label>

                <div>
                    <input type="text" value="5%">
                    <input type="text" value="10%">
                    <input type="text" value="15%">
                    <input type="text" value="25%">
                    <input type="text" value="50%">
                    <input type="text" name="outra" id="outra" placeholder="Outra">
                </div>
            </div>

            <div class="pessoas">
                <label for="pessoas">Quantidade de Pessoas</label>
                <p id="erro">Não pode ser 0</p>
                <div>
                    <img src="./Imagens/icon-person.svg" alt="">
                    <input type="number" name="pessoas" id="pessoas" placeholder="0">
                </div>
            </div>
        </form>
    </section>

    <section class="resultados">
        <div  class="gorjeta-total">
            <p>
                <strong>Gorgeja</strong><br>
                / pessoa
            </p>

            <strong>$ 0.00</strong>
        </div>

        <div  class="total">
            <p>
                <strong>Total</strong><br>
                / pessoa
            </p>

            <strong>$ 0.00</strong>
        </div>
    </section>
   </main>
</body>
</html>
