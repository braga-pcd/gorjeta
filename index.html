<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de gorjeta</title>
</head>
<body>
   <header>
        <img src="./Imagens/logo.svg" alt="Logo splitter">
   </header>

   <main>
    <section class="informacoes">
        <form action="">
            <div class="conta">
                <label for="conta">Conta</label>
                <div>
                    <img src="./Imagens/icon-dollar.svg" alt="">
                    <input type="number" name="conta" id="conta">
                </div>
            </div>
            
            <div class="gorjeta">
                <label for="outra">Selecione a gorjeta</label>

                <div>
                    <input type="text" value="5%">
                    <input type="text" value="10%">
                    <input type="text" value="15%">
                    <input type="text" value="25%">
                    <input type="text" value="50%">
                    <input type="text" name="outra" id="outra">
                </div>
            </div>

            <div class="pessoas">
                <label for="conta">Quantidade de Pessoas</label>
                <p>Não pode ser 0</p>
                <div>
                    <img src="./Imagens/icon-person.svg" alt="">
                    <input type="number" name="conta" id="conta">
                </div>
            </div>
        </form>
    </section>
   </main>
</body>
</html>
